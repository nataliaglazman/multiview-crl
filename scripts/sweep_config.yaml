# W&B Sweep Configuration for Content/Style Separation
#
# Usage:
#   wandb sweep sweep_config.yaml
#   wandb agent <entity>/<project>/<sweep_id>
#
# Or via SLURM:
#   ./scripts/launch_sweep.sh --num-agents 50
#
# NOTE: Uses scripts/sweep_train.py as a wrapper to handle boolean flags
# and the content_size < vqvae_hidden_channels constraint.

program: scripts/sweep_train.py
method: bayes
metric:
  name: separation_score
  goal: maximize

parameters:
  # --- Tier 1: High-impact ---
  scale_contrastive_loss:
    distribution: log_uniform_values
    min: 0.1
    max: 5.0
  scale_recon_loss:
    distribution: log_uniform_values
    min: 0.1
    max: 5.0
  # hidden_channels and embed_dim are always set equal (handled by sweep_train.py)
  vqvae_hidden_channels:
    values: [32, 48]
  # vqvae_embed_dim:
  #   values: [32, 48, 64]

  mask_mode:
    values: ["fixed", "learned"]
  tau:
    distribution: log_uniform_values
    min: 0.05
    max: 1.0
  content_ratios:
    values:
      - [0.5, 0.3, 0.2]
      - [0.5, 0.5, 0.5]
      - [0.7, 0.5, 0.3]
      - [0.7, 0.7, 0.7]
  vqvae_nb_entries:
    values:
    - [256, 128, 64]
    - [384, 192, 96]
    - [128, 64, 32]
    - [512, 256, 128]
  contrastive_level_weights:
    values:
    - [1.0, 1.0, 1.0]
    - [1.0, 0.5, 0.25]
    - [0.25, 0.5, 1.0]
  # skip_decoder_concat_levels:
  #   values:
  #     - None
  #     - [0]
  #     - [0, 1]

  # --- Tier 2: Secondary ---
  lr:
    distribution: log_uniform_values
    min: 0.0005
    max: 0.002
  # bt_lambda:
  #   distribution: log_uniform_values
  #   min: 0.001
  #   max: 0.05

  # --- Fixed parameters (passed through to sweep_train.py) ---
  batch_size:
    value: 3
  gradient_accumulation_steps:
    value: 4
  train_steps:
    value: 20000
  dataroot:
    value: "/nfs/home/nglazman/data"
  dataset_name:
    value: "ADNI_stripped"
  encoder_type:
    value: "vqvae"
  patch_contrastive:
    value: true
  patch_grid:
    value: [4, 5, 4]
  labels_path:
    value: "/nfs/home/nglazman/nmpevqvae/labels_cleaned_3class.csv"
  vqvae_nb_levels:
    value: 3
  content_dim:
    value: 128
  total_dim:
    value: 512
  vqvae_scaling_rates:
    value: [2, 2, 2]
  spatial_size:
    value: [150, 180, 150]
  use_amp:
    value: true
  use_wandb:
    value: true
  resume_training:
    value: true
  workers:
    value: 8
  recon_loss_start_step:
    value: 2000
  content_style_levels:
    value: [0, 1, 2]
  cross_view_negs_only:
    value: true
  separate_encoders:
    value: true
  gradient_checkpointing:
    value: true
  skip_recon_ratio:
    value: 0.5
  image_spacing:
    value: 1.0
  cache_dataset:
    value: true
  vq_commitment_weight:
    value: 0.25
  cache_dir:
    value: "/nfs/home/nglazman/cache/multiview"
  pass_full_to_next_level:
    value: true
  cb_ema_decay:
    value: 0.99
  recon_loss_fn:
    value: "JukeboxPerceptualLoss"

command:
  - ${env}
  - python
  - ${program}
  - ${args}
